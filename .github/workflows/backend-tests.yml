name: Backend Tests                                                                                                                 
                                                                                                                                      
on: [push]
                                                                                                                                      
jobs:           
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
                                                                                                                                      
      - name: Set up Python
        uses: actions/setup-python@v5                                                                                               
        with:   
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests                                                                                                             
        run: cd backend && pytest tests/